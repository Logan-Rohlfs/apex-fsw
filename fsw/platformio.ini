; Apex flight computer — build modes
;
; Three mutually exclusive modes (see src/main.cpp):
;
;   teensy41_debug   Bench / development. USB serial to the monitor app:
;                    sensor plots (>key:value), state panel (!key:value),
;                    log lines (#LEVEL:), inbound commands (TELEM_ON, ...).
;                    Telemetry beacon off by default.
;
;   teensy41_hil     Hardware-in-the-loop — NOT FOR FLIGHT. Sensors are
;                    injected over USB as SimPackets (fsw/src/hil.h); the
;                    control output returns as TeensyPackets. Flight-like
;                    code path: fusion / state machine / control run as in
;                    flight. Announces #HIL_READY until a sim connects;
;                    a 5 s packet gap resets the session for the next run.
;
;   teensy41_flight  Flight configuration. No serial scaffolding, no LOG
;                    output, no command parser. Telemetry beacon always on.
;                    MTP disk stays enabled for post-flight log download.
;
;   pio run -e teensy41_debug  [-t upload]
;   pio run -e teensy41_hil    [-t upload]
;   pio run -e teensy41_flight [-t upload]

[platformio]
default_envs = teensy41_debug

[env]
platform = teensy
board = teensy41
framework = arduino
lib_deps =
    https://github.com/sparkfun/SparkFun_BMP581_Arduino_Library
    adafruit/Adafruit ADXL375
    tdk-invn-oss/ICM45686
    https://github.com/sparkfun/SparkFun_MMC5983MA_Magnetometer_Arduino_Library
    paulstoffregen/Mahony
    sparkfun/SparkFun u-blox GNSS v3

[env:teensy41_debug]
build_flags =
    -DICM45686
    -DUSB_MTPDISK_SERIAL
    -DAPEX_DEBUG

[env:teensy41_hil]
build_flags =
    -DICM45686
    -DAPEX_HIL

[env:teensy41_flight]
build_flags =
    -DICM45686
    -DUSB_MTPDISK_SERIAL

# environment.yaml
# Atmospheric model and rail configuration. Site-specific data lives in config/sites/.
#
# To switch launch sites, change active_site to the filename stem of the desired
# profile under config/sites/ (without the .yaml extension):
#
#   active_site: "irec_2026_pecos_tx"       # competition
#   active_site: "seymour_tx_2026_05_24"    # Seymour TX test flight — for validation

active_site: "irec_2026_pecos_tx"

# Atmospheric model configuration.
# The model is selected automatically at runtime based on how close today's date
# is to the site's sim_datetime. Set model_override to force a specific model.
#
# Auto-selection ladder (most accurate wins if data is available):
#   RAP    — NOAA Rapid Refresh.  Updates hourly. Available within ~18 hours of now.
#   NAM    — North America Mesoscale. Higher res than GFS. Available within ~3 days.
#   GFS    — NOAA Global Forecast System. Available within ~16 days.
#   ERA5   — ECMWF reanalysis. Historical only. Requires Copernicus CDS API key.
#   standard_atmosphere — ISA model, no wind. Always available. Used for dev/CI.
#
# Set model_override: "ERA5" when running validation sims against the Seymour TX flight.
atmosphere:
  # NOAA retired their OPeNDAP/DODS endpoint (nomads.ncep.noaa.gov/dods) in 2025.
  # RocketPy 1.10 hardcodes those dead URLs — all forecast fetches fail with C-level
  # parser errors that can't be suppressed cleanly. Forced to standard_atmosphere
  # until RocketPy ships updated fetchers for the replacement NOMADS API.
  # Track: https://github.com/RocketPy-Team/RocketPy/issues (search NOMADS)
  model_override: "standard_atmosphere"

  # Days-until-launch thresholds that trigger each model.
  # Adjust if a model's actual availability window differs from these defaults.
  model_thresholds:
    RAP_days:  0.75             # 18 hours — RAP is available, use it
    NAM_days:  3.0              # within 3 days — NAM has good coverage
    GFS_days:  16.0             # within 16 days — GFS forecast exists

  # Fallback wind used only when standard_atmosphere is active (ISA has no wind).
  # Based on June climatology for the active site: ~5 mph, calmer at dawn.
  wind:
    speed_ms: 2.5               # m/s — ~5 mph, representative of early morning
    direction_deg: 180.0        # degrees — wind coming FROM the south
    shear_ms_per_m: 0.002       # m/s gained per meter altitude; 0 to disable

# Launch rail configuration.
# Confirm inclination and heading with the RSO on launch day.
# Typical IREC rail: 12 ft (~3.6 m), near-vertical with slight wind-compensation cant.
rail:
  length_m: 3.658               # 12 ft standard IREC rail
  inclination_deg: 85.0         # degrees from horizontal — 90 = perfectly vertical
  heading_deg: 0.0              # degrees from north — adjust for wind on the day
